<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#F4EFE7"/>
  <rect x="0.5" y="0.5" width="31" height="31" rx="6.5" fill="none" stroke="rgba(60,48,36,0.12)"/>
  <!-- five reading-mood book spines on a shared baseline -->
  <rect x="5" y="7" width="3" height="18" rx="1" fill="#E5C39B"/>
  <rect x="9" y="7" width="3" height="18" rx="1" fill="#7E93A6"/>
  <rect x="13" y="7" width="3" height="18" rx="1" fill="#8E7BA6"/>
  <rect x="17" y="7" width="3" height="18" rx="1" fill="#8B4F5C"/>
  <!-- the rightmost spine leans left like a bookend, on the same baseline -->
  <rect x="21" y="7" width="3" height="18" rx="1" fill="#A3B299"
        transform="translate(4 -0.8) rotate(-16 24 25)"/>
</svg>
